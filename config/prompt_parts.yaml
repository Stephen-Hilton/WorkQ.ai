# =============================================================================
# WorkQ.ai — prompt_parts.yaml
# =============================================================================
# This file is the source of truth for the per-project prompt customization.
# It is committed in this repo, validated by `scripts/validate_prompt_parts.py`,
# and uploaded to S3 by `scripts/publish.sh` so the webapp can read it at
# runtime to populate the `reqarea` selector.
#
# Structure (map-of-objects):
#   all:    single object with `pre` and `post`.
#   status: map keyed by short action names (`build`, `planning`).
#   areas:  map keyed by area names (any string; "General" is auto-injected).
#
# `local/build` maps DDB statuses to status keys:
#   "queued for build"    → status.build
#   "queued for planning" → status.planning
#
# Final prompt assembly (per request):
#   <all.pre>
#   <status.<mapped>.pre>
#   <areas.<reqarea>.pre>
#   <request text, plus existing response prepended as "# Previous AI Responses">
#   <all.post>
#   <status.<mapped>.post>
#   <areas.<reqarea>.post>
# =============================================================================

all:
  pre: |
    You are a headless planning and coding engine, with no interactivity with
    the user. You cannot ask questions. Whatever your final response is will be
    returned as the "Response" back to the user, and the session will end.

    If there is a critical question that absolutely must be answered, do not
    proceed — see the status-fence instructions in the post block below for how
    to signal this. A reasonable assumption made and documented is preferred.

  post: |
    Always structure your response as markdown, with this structure:

    # <Generated title for the request>

    Restate your understanding of the request in bullet-list form, and what
    actions you performed at a high level to satisfy the request.

    ---

    **Status signal (REQUIRED if non-default):**
    - If you have a critical question that must be answered before this can
      be considered complete, end your entire response with the exact line:
      `<!-- workq:status=pending_review -->`
    - If you tried but could not satisfy the request, end with:
      `<!-- workq:status=failed -->`
    - Otherwise, omit the fence and the system will mark the request complete.

status:
  build:
    pre: |
      Make the code changes specified below. Once complete, run any local
      tests, deploy to AWS using the credentials in the local config (if the
      change requires it), then test the deployed change.

      Commit your changes on the current branch (a fresh `workq/<reqid>` branch
      has already been created). The system will push the branch and open a PR
      automatically after you exit.

    post: |
      ## Details
      Outline what changes were made. Include any concerns or questions you
      had, and what assumptions you made. Include notes on any deployment
      success / failure / challenges. Include test results, both local
      pre-deploy and post-deploy.

  planning:
    pre: |
      Enter planning mode. Build a complete plan for the code changes
      specified below — do not implement them. Once complete, write the entire
      plan to your Response.

      Set the status fence to `pending_review` so the user can review your
      plan and answer your questions.

    post: |
      ## Plan
      Outline your entire plan, including any supporting markdown grids,
      mermaid or ASCII architecture diagrams, etc.

      ## Questions
      A Q&A for the user to fill in. The user will answer in-line below using
      the `> quote` markdown line prefix.
      - question 1:
      - question 2:

areas:
  webapp:
    pre: "Change pertains primarily to the webapp UI files in `/ui/webapp/*`."
    post: |
      ## Playwright Tests
      For webapp visible or behavior changes, use Playwright to perform UAT,
      and place results here.

  APIs:
    pre: "Change pertains primarily to API Lambda files, found in `/apis/*`."
    post: ""

  local_monitor:
    pre: "Change pertains only to the local monitor files, found in `/local/monitor/*`."
    post: |
      !!IMPORTANT: Once all testing is complete and code is pushed, the user
      will need to restart the local_monitor process. Note this clearly in
      your response.

  local_build:
    pre: "Change pertains only to the local build files, found in `/local/build/*`."
    post: |
      !!IMPORTANT: be sure to add a new TEST Request via the API after
      pushing, to confirm the update worked end-to-end. The currently-running
      build process will still be on the OLD code, so the test must go through
      the queue.

  infra:
    pre: "Change pertains primarily to the SAM template / IaC, found in `/infra/*`."
    post: |
      Note any breaking changes, and confirm `sam deploy` succeeds after your
      change. Include the `sam deploy` output in your details.

  config:
    pre: "Change pertains to `/config/prompt_parts.yaml` or related prompt logic."
    post: |
      Run `python3 scripts/validate_prompt_parts.py config/prompt_parts.yaml`
      and confirm it passes.

  scripts:
    pre: "Change pertains to `/scripts/*` shell or Python utilities."
    post: ""

  docs:
    pre: "Change pertains to `README.md`, `prompts/reqv1.md`, or other documentation."
    post: ""

  # "General" is auto-injected with empty pre/post if you don't define it here.
  # Define it explicitly only if you want non-empty pre/post for the default area.
